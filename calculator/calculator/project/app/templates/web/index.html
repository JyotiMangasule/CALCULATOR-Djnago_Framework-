<!DOCTYPE html>
{%csrf_token %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/web/styles.css">
</head>
<body>
    <table class="calculator" >
        <tr>
          <td colspan="3" > <input class="display-box" type="text" id="result" disabled /> </td>
       
          <!-- clearScreen() function clears all the values -->
          <td> <input type="button" value="C" onclick="clearScreen()" id="btn" /> </td>
        </tr>
        <tr>
          <!-- display() function displays the value of clicked button -->
          <td > <input type="button" value="1" onclick="display('1')" id="first" /> </td>
          <td > <input type="button" value="2" onclick="display('2')" id="second"/> </td>
          <td> <input type="button" value="3" onclick="display('3')" /> </td>
          <td> <input type="button" value="/" onclick="display('/')"id="oper" /> </td>
        </tr>
        <tr>
          <td> <input type="button" value="4" onclick="display('4')"  /> </td>
          <td> <input type="button" value="5" onclick="display('5')" /> </td>
          <td> <input type="button" value="6" onclick="display('6')" /> </td>
          <td> <input type="button" value="-" onclick="display('-') " id="oper"  /> </td>
        </tr>
        <tr>
          <td> <input type="button" value="7" onclick="display('7')" /> </td>
          <td> <input type="button" value="8" onclick="display('8')" /> </td>
          <td> <input type="button" value="9" onclick="display('9')" /> </td>
          <td > <input type="button" value="+" onclick="display('+')" id="oper"/> </td>
        </tr>
        <tr>
          <td> <input type="button" value="." onclick="display('.')" /> </td>
          <td> <input type="button" value="0" onclick="display('0')"  /> </td>
       
          <!-- calculate() function evaluates the mathematical expression -->
          <td> <input type="button" value="=" onclick="calculate()" id="btn_add" /> </td>
          <td> <input type="button" value="*" onclick="display('*')" id="oper" /> </td>
        </tr>
      </table>

</body>
</html>
<script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
<script type="text/javascript" src="/static/web/script.js"></script>
